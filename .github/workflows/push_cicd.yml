name: Samrt Saver CI/CD Pipeline

on:
    push:
        branches: 
            - main


jobs: 
    test: 
        runs-on: ubuntu-latest
        container: 
            image: python:3.11-slim
        steps: 
            - uses: actions/checkout@v3

            - name: Install dependancies
              run: pip install -r backend/requirements.txt

            - name: Run Backend
              run: uvicorn main:app & sleep 5